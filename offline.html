<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tubarão Dogueria — Sem conexão</title>
  <link rel="shortcut icon" href="img/favicon/icon-192.png" type="image/png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ── Variáveis da marca ── */
    :root {
      --azul:        #1a4fc4;
      --azul-escuro: #0d2d7a;
      --amarelo:     #f5d800;
      --bg:          #0e1f5e;
      --fonte-titulo: 'Barlow Condensed', sans-serif;
      --fonte-corpo:  'Barlow', sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root { --bg: #0a0f1e; }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--fonte-corpo);
      background: var(--bg);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      text-align: center;
    }

    /* ── Logo ── */
    .logo-img {
      width: 130px;
      height: 120px;
      object-fit: contain;
      border-radius: 50%;
      filter: drop-shadow(0 4px 16px rgba(0,0,0,.6));
      margin-bottom: 28px;
      animation: float 3s ease-in-out infinite;
    
    }

    @keyframes float {
      0%, 100% { transform: translateY(0);    }
      50%       { transform: translateY(-8px); }
    }

    /* ── Título ── */
    .titulo {
      font-family: var(--fonte-titulo);
      font-weight: 700;
      font-size: 28px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--amarelo);
      margin-bottom: 12px;
    }

    /* ── Ícone Wi-Fi cortado ── */
    .icone-offline {
      font-size: 52px;
      margin-bottom: 16px;
      filter: grayscale(0.3);
    }

    /* ── Mensagem principal ── */
    .mensagem {
      font-size: 16px;
      color: rgba(255,255,255,.8);
      line-height: 1.6;
      max-width: 320px;
      margin-bottom: 32px;
    }

    .mensagem strong {
      color: #ffffff;
    }

    /* ── Card de dica ── */
    .dica {
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      padding: 16px 20px;
      max-width: 340px;
      margin-bottom: 32px;
      font-size: 14px;
      color: rgba(255,255,255,.65);
      line-height: 1.5;
    }

    .dica strong {
      color: var(--amarelo);
      display: block;
      font-family: var(--fonte-titulo);
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    /* ── Botão tentar novamente ── */
    .btn-retry {
      background: var(--amarelo);
      color: var(--azul-escuro);
      border: none;
      border-bottom: 4px solid #c9a800;
      border-radius: 50px;
      padding: 14px 36px;
      font-family: var(--fonte-titulo);
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 6px 24px rgba(245,216,0,.45);
      margin-bottom: 20px;
    }

    .btn-retry:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 32px rgba(245,216,0,.65);
    }

    .btn-retry:active {
      transform: scale(0.97);
      border-bottom-width: 2px;
    }

    /* ── Link WhatsApp direto ── */
    .link-wpp {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #25d366;
      font-family: var(--fonte-titulo);
      font-weight: 600;
      font-size: 15px;
      letter-spacing: .5px;
      text-decoration: none;
      padding: 8px 16px;
      border: 1.5px solid #25d366;
      border-radius: 50px;
      transition: background .2s, color .2s;
    }

    .link-wpp:hover {
      background: #25d366;
      color: #ffffff;
    }

    .link-wpp svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    /* ── Rodapé ── */
    .rodape {
      margin-top: 40px;
      font-size: 12px;
      color: rgba(255,255,255,.3);
      font-family: var(--fonte-titulo);
      letter-spacing: .5px;
    }
  </style>
</head>
<body>

  <div class="icone-offline">📡</div>

  <img class="logo-img" src="img/logozap.jpeg" alt="Tubarão Dogueria">

  <div class="titulo">Sem conexão</div>

  <p class="mensagem">
    Parece que você está <strong>sem internet</strong> no momento.<br>
    Seu carrinho está salvo — é só voltar quando a conexão retornar. 🦈
  </p>

  <div class="dica">
    <strong>💡 Dica</strong>
    Se quiser fazer seu pedido agora, entre em contato direto pelo WhatsApp. A gente atende!
  </div>

  <button class="btn-retry" onclick="tentarNovamente()">
    🔄 Tentar novamente
  </button>

  <a class="link-wpp" href="https://wa.me/5569993009408" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
    </svg>
    Chamar no WhatsApp
  </a>

  <p class="rodape">© 2025 Tubarão Dogueria</p>

  <script>
    function tentarNovamente() {
      // Tenta recarregar a página principal
      window.location.href = './';
    }

    // Se voltar a ter internet, redireciona automaticamente
    window.addEventListener('online', () => {
      setTimeout(() => { window.location.href = './'; }, 800);
    });
  </script>

</body>
</html>
