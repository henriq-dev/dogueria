<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema indisponível</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#020617;
color:#22c55e;
font-family:"JetBrains Mono", monospace;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

canvas{
position:absolute;
top:0;
left:0;
z-index:0;
}

.terminal{
position:relative;
z-index:1;
width:90%;
max-width:700px;
background:#020617;
border:1px solid #1e293b;
border-radius:8px;
box-shadow:0 0 40px rgba(0,0,0,.7);
}

.header{
background:#0f172a;
padding:10px 15px;
display:flex;
align-items:center;
gap:8px;
}

.dot{
width:12px;
height:12px;
border-radius:50%;
}

.red{background:#ef4444}
.yellow{background:#f59e0b}
.green{background:#22c55e}

.title{
margin-left:10px;
color:#94a3b8;
font-size:13px;
}

.message{
padding:30px;
text-align:center;
border-bottom:1px solid #1e293b;
}

.message h1{
font-size:20px;
color:#ef4444;
margin-bottom:10px;
}

.message p{
color:#94a3b8;
font-size:14px;
line-height:1.6;
}

.logs{
padding:20px;
height:240px;
overflow:hidden;
font-size:14px;
}

.log{
margin-bottom:6px;
white-space:nowrap;
}

.status{
padding:15px 20px;
border-top:1px solid #1e293b;
display:flex;
justify-content:space-between;
font-size:14px;
}

.offline{
color:#ef4444;
}

.btn{
display:block;
margin:20px;
text-align:center;
background:#25D366;
color:white;
padding:12px;
border-radius:6px;
text-decoration:none;
font-weight:600;
box-shadow:0 0 10px rgba(37,211,102,.6);
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 25px rgba(37,211,102,.9);
}

@media(max-width:480px){

.logs{
height:200px;
font-size:12px;
}

.message h1{
font-size:18px;
}

}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="terminal">

<div class="header">

<div class="dot red"></div>
<div class="dot yellow"></div>
<div class="dot green"></div>

<div class="title">system-status.log</div>

</div>

<div class="message">

<h1>Sistema indisponível</h1>

<p>
O sistema está temporariamente indisponível.
</p>

<p>
Entre em contato com o desenvolvedor para mais informações.
</p>

</div>

<div class="logs" id="logs"></div>

<div class="status">

<div>SERVIÇO: <span class="offline">OFFLINE</span></div>

<div>AGUARDANDO SUPORTE</div>

</div>

<a class="btn"
href="https://wa.me/5569981011321"
target="_blank"
rel="noopener noreferrer">

Entrar em contato com o desenvolvedor

</a>

</div>

<script>

const logLines=[

"initializing system check...",
"verifying server status...",
"connection failure detected...",
"attempting reconnection...",
"system unavailable...",
"waiting for developer response..."

]

const logsContainer=document.getElementById("logs")

let index=0

function addLog(){

if(index>=logLines.length) return

const line=document.createElement("div")
line.className="log"
line.textContent="> "+logLines[index]

logsContainer.appendChild(line)

logsContainer.scrollTop=logsContainer.scrollHeight

index++

}

setInterval(addLog,900)

/* partículas */

const canvas=document.getElementById("particles")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

for(let i=0;i<80;i++){

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speed:Math.random()*0.6
})

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#22c55e"

particles.forEach(p=>{

ctx.beginPath()
ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
ctx.fill()

p.y+=p.speed

if(p.y>canvas.height) p.y=0

})

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
