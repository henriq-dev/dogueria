
<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema temporariamente indisponível</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#020617;
color:#22c55e;
font-family:"JetBrains Mono", monospace;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* partículas */

canvas{
position:absolute;
top:0;
left:0;
z-index:0;
}

/* terminal */

.terminal{
position:relative;
z-index:1;
width:90%;
max-width:700px;
background:#020617;
border:1px solid #1e293b;
border-radius:8px;
box-shadow:0 0 40px rgba(0,0,0,.7);
}

/* header */

.header{
background:#0f172a;
padding:10px 15px;
display:flex;
align-items:center;
gap:8px;
}

.dot{
width:12px;
height:12px;
border-radius:50%;
}

.red{background:#ef4444}
.yellow{background:#f59e0b}
.green{background:#22c55e}

.title{
margin-left:10px;
color:#94a3b8;
font-size:13px;
}

/* mensagem principal */

.message{
padding:25px;
text-align:center;
border-bottom:1px solid #1e293b;
}

.message h1{
font-size:20px;
color:#f59e0b;
margin-bottom:10px;
}

.message p{
color:#94a3b8;
font-size:14px;
line-height:1.6;
}

/* logs */

.logs{
padding:20px;
height:260px;
overflow:hidden;
font-size:14px;
}

.log{
margin-bottom:6px;
white-space:nowrap;
}

/* status */

.status{
padding:15px 20px;
border-top:1px solid #1e293b;
display:flex;
justify-content:space-between;
font-size:14px;
}

.offline{
color:#ef4444;
}

/* botão */

.btn{
display:block;
margin:20px;
text-align:center;
background:#25D366;
color:white;
padding:12px;
border-radius:6px;
text-decoration:none;
font-weight:600;
box-shadow:0 0 10px rgba(37,211,102,.6);
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 25px rgba(37,211,102,.9);
}

/* mobile */

@media(max-width:480px){

.logs{
height:200px;
font-size:12px;
}

.message h1{
font-size:18px;
}

}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="terminal">

<div class="header">

<div class="dot red"></div>
<div class="dot yellow"></div>
<div class="dot green"></div>

<div class="title">system-maintenance.log</div>

</div>

<div class="message">

<h1>⚠ Sistema temporariamente indisponível</h1>

<p>
Estamos realizando uma manutenção técnica para melhorar a estabilidade do sistema.
</p>

<p>
O serviço será normalizado em breve.
</p>

</div>

<div class="logs" id="logs"></div>

<div class="status">

<div>SISTEMA: <span class="offline">INDISPONÍVEL</span></div>

<div>MANUTENÇÃO EM ANDAMENTO</div>

</div>

<a class="btn"
href="https://wa.me/5569981011321"
target="_blank"
rel="noopener noreferrer">

Suporte • Henriq-dev

</a>

</div>

<script>

/* logs simulados */

const logLines=[

"system maintenance started...",
"placing application in maintenance mode...",
"disconnecting active sessions...",
"checking server dependencies...",
"updating backend modules...",
"checking database integrity...",
"optimizing tables...",
"clearing application cache...",
"deploying improvements...",
"restarting services...",
"validating system health...",
"maintenance in progress..."

]

const logsContainer=document.getElementById("logs")

let index=0

function addLog(){

if(index>=logLines.length) return

const line=document.createElement("div")
line.className="log"
line.textContent="> "+logLines[index]

logsContainer.appendChild(line)

logsContainer.scrollTop=logsContainer.scrollHeight

index++

}

setInterval(addLog,900)

/* partículas */

const canvas=document.getElementById("particles")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

for(let i=0;i<80;i++){

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speed:Math.random()*0.6
})

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#22c55e"

particles.forEach(p=>{

ctx.beginPath()
ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
ctx.fill()

p.y+=p.speed

if(p.y>canvas.height) p.y=0

})

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
