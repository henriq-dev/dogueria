<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sistema indisponível | Suporte do desenvolvedor</title>

<meta name="description" content="O sistema está temporariamente indisponível. Entre em contato com o desenvolvedor para suporte.">

<meta name="robots" content="noindex, nofollow">

<link rel="canonical" href="https://seusite.com/manutencao">

<meta property="og:title" content="Sistema indisponível">
<meta property="og:description" content="O sistema está temporariamente indisponível. Entre em contato com o desenvolvedor.">
<meta property="og:type" content="website">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#020617;
color:#22c55e;

font-family:"JetBrains Mono", monospace;

min-height:100vh;

display:flex;
align-items:center;
justify-content:center;

padding:20px;

}

main{

max-width:700px;
width:100%;

border:1px solid #1e293b;
border-radius:10px;

background:#020617;

box-shadow:0 0 40px rgba(0,0,0,.7);

}

header{

display:flex;
align-items:center;
gap:8px;

background:#0f172a;

padding:12px 16px;

border-bottom:1px solid #1e293b;

}

.dot{

width:12px;
height:12px;
border-radius:50%;

}

.red{background:#ef4444}
.yellow{background:#f59e0b}
.green{background:#22c55e}

.title{

color:#94a3b8;
font-size:13px;

margin-left:8px;

}

.section-message{

padding:30px;
text-align:center;

}

.section-message h1{

font-size:22px;
color:#ef4444;

margin-bottom:10px;

}

.section-message p{

color:#cbd5f5;
font-size:15px;
line-height:1.6;

}

.logs{

border-top:1px solid #1e293b;

padding:20px;

height:200px;

overflow:hidden;

font-size:14px;

}

.log{

margin-bottom:6px;

}

.status{

border-top:1px solid #1e293b;

padding:15px 20px;

display:flex;
justify-content:space-between;

font-size:14px;

}

.offline{

color:#ef4444;

}

.btn{

display:block;

margin:20px;

text-align:center;

padding:14px;

background:#25D366;

color:white;

border-radius:6px;

text-decoration:none;

font-weight:600;

transition:0.2s;

}

.btn:hover{

transform:scale(1.03);

}

.btn:focus{

outline:3px solid #fff;

outline-offset:2px;

}

footer{

text-align:center;

font-size:12px;

color:#64748b;

padding:10px;

}

</style>

</head>

<body>

<main>

<header>

<div class="dot red"></div>
<div class="dot yellow"></div>
<div class="dot green"></div>

<span class="title">system-status.log</span>

</header>

<section class="section-message" role="alert">

<h1>Sistema indisponível</h1>

<p>
O sistema está temporariamente indisponível.
</p>

<p>
Entre em contato com o desenvolvedor para obter suporte ou mais informações.
</p>

</section>

<section class="logs" id="logs" aria-live="polite">

</section>

<section class="status">

<div>SERVIÇO: <span class="offline">OFFLINE</span></div>

<div>AGUARDANDO SUPORTE</div>

</section>

<a
class="btn"
href="https://wa.me/5569981011321"
target="_blank"
rel="noopener"
aria-label="Entrar em contato com o desenvolvedor pelo WhatsApp"
>

Entrar em contato com o desenvolvedor

</a>

<footer>

© Desenvolvedor Henriq-dev

</footer>

</main>

<script>

const logs=[

"initializing server diagnostics...",
"checking backend services...",
"connection failure detected...",
"system temporarily unavailable...",
"awaiting developer intervention..."

]

const container=document.getElementById("logs")

let i=0

function addLog(){

if(i>=logs.length)return

const line=document.createElement("div")

line.className="log"

line.textContent="> "+logs[i]

container.appendChild(line)

i++

}

setInterval(addLog,1000)

</script>

</body>
</html>
